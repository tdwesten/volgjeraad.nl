# Visit https://soloterm.com to learn more
name: volgjeraad.nl
icon: null
processes:
  Logs:
    command: tail -n 50 -f storage/logs/laravel.log
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Serve:
    command: php artisan serve
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  npm:dev:
    command: npm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Queue:
    command: php artisan queue:work
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
